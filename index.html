<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; script-src 'self' 'unsafe-inline'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Natalia Patkiewicz — Art Leadership & Visual Development</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F4F0;
  --surface: #FFFFFF;
  --text-primary: #1A1A1A;
  --text-secondary: #5A5A5A;
  --text-tertiary: #8A8A8A;
  --border: #E0DDD6;
  --border-light: #ECEAE4;
  --font-display: 'Instrument Sans', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(2rem, 6vw, 4rem);
}

a { text-decoration: none; color: inherit; }

/* ---- Main container ---- */
.placeholder {
  max-width: 860px;
  width: 100%;
  text-align: center;
}

/* ---- Logo / Name ---- */
.logo {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 3rem;
  opacity: 0;
  animation: fadeIn 0.8s ease 0.2s forwards;
}

/* ---- Heading ---- */
.heading {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 1rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.4s forwards;
}

.subtext {
  font-size: clamp(0.95rem, 1.8vw, 1.1rem);
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 620px;
  margin: 0 auto 2.5rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.55s forwards;
}

/* ---- Mosaic ---- */
.mosaic {
  display: grid;
  grid-template-columns: 1fr 0.65fr 1fr;
  grid-template-rows: 1fr 1fr;
  height: 420px;
  gap: 10px;
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.7s forwards;
  transition: grid-template-columns 0.5s cubic-bezier(0.16, 1, 0.3, 1),
              grid-template-rows 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.mosaic-item {
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.mosaic-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.mosaic-item:hover img {
  transform: scale(1.03);
}

/* First image spans full left column */
.mosaic-item:nth-child(1) {
  grid-row: 1 / 3;
}

/* Middle: slim portrait */
.mosaic-item:nth-child(2) {
  grid-row: 1 / 3;
}

/* Right column: 2 stacked */
.mosaic-item:nth-child(3) {
  grid-column: 3;
}
.mosaic-item:nth-child(4) {
  grid-column: 3;
}

/* ---- Mosaic hover: expand hovered column/row, shrink others ---- */

/* Hover on left column (item 1) */
.mosaic:has(.mosaic-item:nth-child(1):hover) {
  grid-template-columns: 1.6fr 0.4fr 0.6fr;
}

/* Hover on center column (item 2) */
.mosaic:has(.mosaic-item:nth-child(2):hover) {
  grid-template-columns: 0.7fr 1.2fr 0.7fr;
}
.mosaic-item:nth-child(2) img {
  object-position: center 80%;
  transform-origin: center 85%;
}

/* Hover on top-right (item 3) */
.mosaic:has(.mosaic-item:nth-child(3):hover) {
  grid-template-columns: 0.7fr 0.4fr 1.5fr;
  grid-template-rows: 1.4fr 0.6fr;
}

/* Hover on bottom-right (item 4) */
.mosaic:has(.mosaic-item:nth-child(4):hover) {
  grid-template-columns: 0.7fr 0.4fr 1.5fr;
  grid-template-rows: 0.6fr 1.4fr;
}

/* ---- Find me line ---- */
.find-me {
  font-size: 0.88rem;
  color: var(--text-tertiary);
  margin-bottom: 1rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.82s forwards;
}

/* ---- Social links ---- */
.socials {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.85s forwards;
}

.social-link {
  font-family: var(--font-display);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding: 0.5em 0;
  position: relative;
  transition: color 0.3s ease;
}

.social-link::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1.5px;
  background: var(--text-primary);
  transform: scaleX(0);
  transform-origin: center;
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.social-link:hover {
  color: var(--text-primary);
}

.social-link:hover::after {
  transform: scaleX(1);
}

/* ---- Divider dots ---- */
.dot-divider {
  color: var(--border);
  font-size: 0.5rem;
  user-select: none;
}

/* ---- Footer line ---- */
.footer-line {
  margin-top: 3rem;
  font-size: 0.72rem;
  color: var(--text-tertiary);
  opacity: 0;
  animation: fadeIn 0.8s ease 1s forwards;
}

/* ---- Animations ---- */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- Responsive ---- */
@media (max-width: 640px) {
  .mosaic {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    height: 360px;
  }
  .mosaic-item:nth-child(1) { grid-row: auto; }
  .mosaic-item:nth-child(2) { grid-row: auto; }
  .mosaic-item:nth-child(3) { grid-column: auto; }
  .mosaic-item:nth-child(4) { grid-column: auto; }
  /* Disable expand on mobile — touch triggers :hover and deforms grid */
  .mosaic:has(.mosaic-item:nth-child(1):hover),
  .mosaic:has(.mosaic-item:nth-child(2):hover),
  .mosaic:has(.mosaic-item:nth-child(3):hover),
  .mosaic:has(.mosaic-item:nth-child(4):hover),
  .mosaic:has(.mosaic-item:hover) {
    grid-template-columns: 1fr 1fr !important;
    grid-template-rows: 1fr 1fr !important;
  }
  .mosaic-item:hover img {
    transform: none !important;
  }

  .socials {
    flex-direction: column;
    gap: 1rem;
  }
  .dot-divider { display: none; }
}
</style>
</head>
<body>

<div class="placeholder">

  <p class="logo">Natalia Patkiewicz</p>

  <h1 class="heading">Something new<br>is in the works.</h1>

  <p class="subtext">Art Leadership and Visual Development for casual and indie games.<br>Full portfolio coming soon.</p>

  <div class="mosaic">
    <div class="mosaic-item">
      <img src="assets/projects/website-wip/preview-01.jpg" alt="Summoned Schnitzel — 3D Art" loading="eager">
    </div>
    <div class="mosaic-item">
      <img src="assets/projects/website-wip/preview-02.jpg" alt="Casual Game — Isometric Scene" loading="eager">
    </div>
    <div class="mosaic-item">
      <img src="assets/projects/website-wip/medium-image-02.jpg" alt="Doom Dash — Action Concept" loading="eager">
    </div>
    <div class="mosaic-item">
      <img src="assets/projects/website-wip/preview-03.jpg" alt="June's Journey — Environment Art" loading="eager">
    </div>
  </div>

  <p class="find-me">In the meantime, find my work here:</p>

  <div class="socials">
    <a href="https://www.linkedin.com/in/natalia-patkiewicz/" target="_blank" rel="noopener noreferrer" class="social-link">LinkedIn</a>
    <span class="dot-divider">&bull;</span>
    <a href="https://www.artstation.com/npatkiewicz" target="_blank" rel="noopener noreferrer" class="social-link">ArtStation</a>
    <span class="dot-divider">&bull;</span>
    <a href="https://www.instagram.com/nataliapatkiewicz/" target="_blank" rel="noopener noreferrer" class="social-link">Instagram</a>
  </div>

  <p class="footer-line">&copy; 2026 Natalia Patkiewicz</p>

</div>

</body>
</html>
